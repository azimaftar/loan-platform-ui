<div class="page">
  <div class="page-header">
    <h1>My Loans</h1>
    <a routerLink="/loans/create" class="btn-primary">+ New Loan</a>
  </div>

  <div *ngIf="loading" class="loading">Loading...</div>

  <div *ngIf="!loading && loans.length === 0" class="empty-state">
    <p>You have no loans yet.</p>
    <a routerLink="/loans/create" class="btn-primary">Apply for a loan</a>
  </div>

  <div *ngIf="!loading && loans.length > 0" class="card">
    <table class="loans-table">
      <thead>
        <tr>
          <th>Purpose</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let loan of loans">
          <td>{{ loan.purpose }}</td>
          <td>RM {{ loan.amount | number:'1.2-2' }}</td>
          <td>
            <span [class]="'status-badge ' + getStatusClass(loan.status)">
              {{ loan.status }}
            </span>
          </td>
          <td>{{ loan.createdAt | date:'dd MMM yyyy' }}</td>
          <td><a [routerLink]="['/loans', loan.id]">View</a></td>
        </tr>
      </tbody>
    </table>

    <div class="pagination">
      <button (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
      <span>Page {{ currentPage + 1 }} of {{ totalPages }}</span>
      <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">Next</button>
    </div>
  </div>
</div>
